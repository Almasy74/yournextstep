[build]
  command = "npm install && node build.js"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "https://yournextstep.ai/:splat"
  status = 301
  force = true
  conditions = {Host = ["www.yournextstep.ai"]}

[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/how-scoring-works.html"
  to = "/how-we-evaluate-decisions/"
  status = 301

[[redirects]]
  from = "/sources-update-policy.html"
  to = "/editorial-policy/"
  status = 301

[[redirects]]
  from = "/disclaimer.html"
  to = "/disclaimer/"
  status = 301

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-default.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-default.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
