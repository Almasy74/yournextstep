name: Prod Release Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

jobs:
  prod-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Run local + prod release gate
        run: npm run verify:seo -- --prod
