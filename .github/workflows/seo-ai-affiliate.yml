name: SEO AI Affiliate Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  seo-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Run SEO release gate
        run: npm run verify:seo

  lighthouse-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun --config=./lighthouserc.json
